version: "3.9"

services:

  # =========================
  # PostgreSQL Database
  # =========================
  db:
    image: postgres:16
    container_name: lms-postgres
    restart: always
    environment:
      POSTGRES_DB: lms
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: lms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # =========================
  # MinIO Object Storage
  # =========================
  minio:
    image: quay.io/minio/minio:RELEASE.2024-05-28T17-19-04Z
    container_name: lms-minio
    command: server /data --console-address ":9001"
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  # =========================
  # Content Service
  # =========================
  content-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: content-service
    restart: always
    depends_on:
      - db
      - minio
    ports:
      - "9002:9002"
    environment:
      SPRING_PROFILES_ACTIVE: docker

      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/lms
      SPRING_DATASOURCE_USERNAME: lms
      SPRING_DATASOURCE_PASSWORD: lms

      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: lms12345

volumes:
  pgdata:
  minio-data:
