server:
  port: 9002

spring:
  application:
    name: content-service

  config:
    import: optional:configserver:http://config-server:8888

  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 10
        initial-interval: 2000
        multiplier: 1.5

  servlet:
    multipart:
      enabled: true
      max-file-size: 6000MB
      max-request-size: 6000MB

logging:
  level:
    org.springframework.web.cors: DEBUG
    org.springframework.security: DEBUG

minio:
  url: http://minio:9100
  access-key: raju123345
  secret-key: rju456789544
  bucket: lms12345

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER:http://discovery-service:8761/eureka}

  instance:
    prefer-ip-address: true